<div class="admin-container">

  <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
  <aside class="admin-sidebar" [class.collapsed]="layoutService.isSidebarCollapsed()">

    <div class="sidebar-header">
      <h2 *ngIf="!layoutService.isSidebarCollapsed()">Administration</h2>
      <button class="toggle-btn" (click)="layoutService.toggleSidebar()" title="Réduire le menu">
        <!-- Expanded → flèche gauche -->
        <svg *ngIf="!layoutService.isSidebarCollapsed()"
          xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        <!-- Collapsed → flèche droite -->
        <svg *ngIf="layoutService.isSidebarCollapsed()"
          xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">

      <!-- ATMs -->
      <a routerLink="/admin/atms" routerLinkActive="active" class="nav-item"
        [title]="layoutService.isSidebarCollapsed() ? 'ATMs' : ''">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="15" rx="2"/>
            <path d="M12 12v3"/>
            <path d="M9 9h6"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
          </svg>
        </span>
        <span class="label" *ngIf="!layoutService.isSidebarCollapsed()">ATMs</span>
      </a>

      <!-- Business -->
      <a routerLink="/admin/businesses" routerLinkActive="active" class="nav-item"
        [title]="layoutService.isSidebarCollapsed() ? 'Business' : ''">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </span>
        <span class="label" *ngIf="!layoutService.isSidebarCollapsed()">Business</span>
      </a>

      <!-- Branches -->
      <a routerLink="/admin/branches" routerLinkActive="active" class="nav-item"
        [title]="layoutService.isSidebarCollapsed() ? 'Branches' : ''">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="label" *ngIf="!layoutService.isSidebarCollapsed()">Branches</span>
      </a>

      <!-- Régions -->
      <a routerLink="/admin/regions" routerLinkActive="active" class="nav-item"
        [title]="layoutService.isSidebarCollapsed() ? 'Régions' : ''">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
        <span class="label" *ngIf="!layoutService.isSidebarCollapsed()">Régions</span>
      </a>

      <!-- Groupes -->
      <a routerLink="/admin/groups" routerLinkActive="active" class="nav-item"
        [title]="layoutService.isSidebarCollapsed() ? 'Groupes' : ''">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="label" *ngIf="!layoutService.isSidebarCollapsed()">Groupes</span>
      </a>

    </nav>
  </aside>

  <!-- ── Content ────────────────────────────────────────────────────────── -->
  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>

</div>
