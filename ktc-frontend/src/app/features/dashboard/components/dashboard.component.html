<div class="grafana-page">

  <header class="grafana-header">
    <div class="grafana-header__left">
      <span class="grafana-badge">NOC</span>
      <h1 class="grafana-title">Dashboard KTC</h1>
    </div>
    <div class="range-pills">
      <button
        *ngFor="let r of ranges"
        class="range-pill"
        [class.active]="activeRange() === r"
        (click)="setRange(r)">
        {{ r.label }}
      </button>
    </div>
  </header>

  <section class="grafana-container">
    <iframe
      class="grafana-frame"
      [src]="grafanaUrl()"
      frameborder="0"
      allowfullscreen
      title="Dashboard KTC Grafana">
    </iframe>
  </section>

</div>
